<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050507">
  <title>Voodoo Media | VMPix V3</title>

  <!-- Future pass: self-host Audiowide in assets/fonts if offline font delivery is preferred. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">

  <style>
    /* =========================================================
       VMPix V3 Public Homepage Shell - Pass 1
       Static foundation only. No routes, APIs, modules, or transitions.
       ========================================================= */

    :root {
      color-scheme: dark;

      --color-bg: #050507;
      --color-bg-deep: #010103;
      --color-panel: rgba(9, 9, 12, 0.72);
      --color-panel-soft: rgba(255, 255, 255, 0.035);
      --color-text: #f7f7f2;
      --color-muted: rgba(247, 247, 242, 0.68);
      --color-faint: rgba(247, 247, 242, 0.43);
      --color-line: rgba(247, 247, 242, 0.2);
      --color-line-strong: rgba(247, 247, 242, 0.42);
      --color-accent: #d51622;
      --color-accent-soft: rgba(213, 22, 34, 0.18);
      --color-accent-line: rgba(213, 22, 34, 0.58);

      --font-display: Audiowide, Orbitron, Rajdhani, "Segoe UI", Arial, sans-serif;
      --font-body: Rajdhani, "Segoe UI", Arial, sans-serif;

      --space-1: 0.5rem;
      --space-2: 0.75rem;
      --space-3: 1rem;
      --space-4: 1.5rem;
      --space-5: 2rem;
      --space-6: 3rem;

      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --tap-target: 48px;
      --frame-max: 44rem;
      --motion-fast: 160ms;
      --motion-standard: 240ms;
      --ease-standard: cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--color-bg-deep);
    }

    body {
      min-width: 320px;
      min-height: 100vh;
      min-height: 100svh;
      margin: 0;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 50% 45%, rgba(213, 22, 34, 0.11), transparent 28rem),
        linear-gradient(180deg, #09090d 0%, var(--color-bg) 42%, var(--color-bg-deep) 100%);
      color: var(--color-text);
      font-family: var(--font-body);
      letter-spacing: 0;
    }

    body::before,
    body::after {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      content: "";
    }

    body::before {
      background:
        linear-gradient(rgba(247, 247, 242, 0.032) 1px, transparent 1px),
        linear-gradient(90deg, rgba(247, 247, 242, 0.026) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.68), rgba(0, 0, 0, 0.12));
    }

    body::after {
      opacity: 0.18;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.055) 0,
        rgba(255, 255, 255, 0.055) 1px,
        transparent 1px,
        transparent 5px
      );
    }

    button {
      font: inherit;
    }

    .site-shell {
      min-height: 100vh;
      min-height: 100svh;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      overflow: hidden;
    }

    .public-home {
      min-width: 0;
      min-height: 0;
      display: grid;
      place-items: center;
      padding:
        max(var(--space-4), env(safe-area-inset-top))
        max(var(--space-3), env(safe-area-inset-right))
        var(--space-4)
        max(var(--space-3), env(safe-area-inset-left));
    }

    .home-frame {
      position: relative;
      width: min(100%, var(--frame-max));
      min-height: clamp(24rem, 66svh, 38rem);
      display: grid;
      place-items: center;
      padding: clamp(2rem, 8vw, 4.5rem) clamp(1rem, 6vw, 3.5rem);
      border: 1px solid var(--color-line);
      border-radius: var(--radius-md);
      background:
        linear-gradient(180deg, var(--color-panel-soft), transparent 46%),
        var(--color-panel);
      isolation: isolate;
    }

    .home-frame::before {
      position: absolute;
      inset: var(--space-2);
      z-index: -1;
      content: "";
      border: 1px solid rgba(213, 22, 34, 0.12);
      border-radius: var(--radius-sm);
      background:
        linear-gradient(90deg, transparent 0 44%, rgba(213, 22, 34, 0.12) 50%, transparent 56%) top / 100% 1px no-repeat,
        linear-gradient(180deg, transparent 0 44%, rgba(247, 247, 242, 0.08) 50%, transparent 56%) left / 1px 100% no-repeat;
    }

    .frame-corner {
      position: absolute;
      width: clamp(2.25rem, 12vw, 4rem);
      height: clamp(2.25rem, 12vw, 4rem);
      border-color: var(--color-line-strong);
      pointer-events: none;
    }

    .frame-corner::after {
      position: absolute;
      width: 0.42rem;
      height: 0.42rem;
      content: "";
      background: var(--color-accent);
    }

    .frame-corner--top-left {
      top: calc(var(--space-2) * -1);
      left: calc(var(--space-2) * -1);
      border-top: 1px solid;
      border-left: 1px solid;
    }

    .frame-corner--top-left::after {
      top: -0.22rem;
      left: -0.22rem;
    }

    .frame-corner--top-right {
      top: calc(var(--space-2) * -1);
      right: calc(var(--space-2) * -1);
      border-top: 1px solid;
      border-right: 1px solid;
    }

    .frame-corner--top-right::after {
      top: -0.22rem;
      right: -0.22rem;
    }

    .frame-corner--bottom-left {
      bottom: calc(var(--space-2) * -1);
      left: calc(var(--space-2) * -1);
      border-bottom: 1px solid;
      border-left: 1px solid;
    }

    .frame-corner--bottom-left::after {
      bottom: -0.22rem;
      left: -0.22rem;
    }

    .frame-corner--bottom-right {
      right: calc(var(--space-2) * -1);
      bottom: calc(var(--space-2) * -1);
      border-right: 1px solid;
      border-bottom: 1px solid;
    }

    .frame-corner--bottom-right::after {
      right: -0.22rem;
      bottom: -0.22rem;
    }

    .home-lockup {
      width: 100%;
      max-width: 38rem;
      display: grid;
      justify-items: center;
      gap: clamp(1.4rem, 5svh, 2.7rem);
      text-align: center;
    }

    .title-group {
      display: grid;
      justify-items: center;
      gap: var(--space-2);
      min-width: 0;
    }

    .title-kicker {
      margin: 0;
      color: var(--color-muted);
      font-size: clamp(0.72rem, 2.8vw, 0.92rem);
      font-weight: 700;
      line-height: 1;
      text-transform: uppercase;
    }

    .home-title {
      max-width: 100%;
      margin: 0;
      color: var(--color-text);
      font-family: var(--font-display);
      font-size: clamp(2rem, 9.8vw, 4.9rem);
      font-weight: 400;
      line-height: 0.95;
      text-transform: none;
      white-space: nowrap;
    }

    .start-button {
      width: clamp(7.25rem, 34vw, 9.4rem);
      min-width: var(--tap-target);
      aspect-ratio: 1;
      display: inline-grid;
      place-items: center;
      border: 1px solid var(--color-accent-line);
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(247, 247, 242, 0.08), transparent 58%),
        radial-gradient(circle, var(--color-accent-soft), transparent 72%),
        rgba(5, 5, 7, 0.86);
      color: var(--color-text);
      cursor: pointer;
      font-family: var(--font-display);
      font-size: clamp(0.78rem, 3.4vw, 1rem);
      letter-spacing: 0;
      text-transform: uppercase;
      transition:
        border-color var(--motion-fast) var(--ease-standard),
        background-color var(--motion-fast) var(--ease-standard),
        color var(--motion-fast) var(--ease-standard);
    }

    .start-button:hover {
      border-color: var(--color-text);
      background-color: rgba(213, 22, 34, 0.1);
    }

    .start-button:focus-visible {
      outline: 2px solid var(--color-text);
      outline-offset: 0.4rem;
    }

    .status-row {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-2) var(--space-3);
      padding:
        var(--space-3)
        max(var(--space-3), env(safe-area-inset-right))
        max(var(--space-3), env(safe-area-inset-bottom))
        max(var(--space-3), env(safe-area-inset-left));
      border-top: 1px solid rgba(247, 247, 242, 0.1);
      color: var(--color-faint);
      font-size: clamp(0.68rem, 2.7vw, 0.78rem);
      font-weight: 700;
      line-height: 1.2;
      text-transform: uppercase;
    }

    .status-row span {
      min-width: 0;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 360px) {
      .home-frame {
        padding-inline: var(--space-3);
      }

      .status-row {
        justify-content: center;
        text-align: center;
        flex-wrap: wrap;
      }
    }

    @media (min-width: 760px) {
      .public-home {
        padding-inline: max(var(--space-5), env(safe-area-inset-left));
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="site-shell">
    <main class="public-home" aria-labelledby="home-title">
      <section class="home-frame" aria-label="Voodoo Media public homepage">
        <span class="frame-corner frame-corner--top-left" aria-hidden="true"></span>
        <span class="frame-corner frame-corner--top-right" aria-hidden="true"></span>
        <span class="frame-corner frame-corner--bottom-left" aria-hidden="true"></span>
        <span class="frame-corner frame-corner--bottom-right" aria-hidden="true"></span>

        <div class="home-lockup">
          <div class="title-group">
            <p class="title-kicker">Welcome To</p>
            <h1 class="home-title" id="home-title">Voodoo Media</h1>
          </div>

          <button
            class="start-button"
            type="button"
            aria-label="Start Voodoo Media"
            aria-describedby="start-description"
          >
            Start
          </button>
          <span class="sr-only" id="start-description">Placeholder start control for the VMPix V3 public shell.</span>
        </div>
      </section>
    </main>

    <footer class="status-row" aria-label="Homepage status">
      <span>System Status: Standby</span>
      <span>Version 3.0</span>
    </footer>
  </div>
</body>
</html>
