<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050507">
  <title>Voodoo Media | VMPix V3</title>

  <!-- Future pass: self-host Audiowide in assets/fonts if offline font delivery is preferred. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">

  <style>
    /* =========================================================
       Homepage v1 source-of-truth implementation
       Static foundation only. No routes, APIs, modules, or backend behavior.

       Future work not included in v1:
       - real public shell routing
       - full Interactive Portfolio Hub design
       - real module selection system
       - full Music module
       - full Wrestling module
       - full Calendar module
       - About/Pricing/Contact routes
       - backend integrations
       - advanced animation polish
       - self-hosted fonts if needed
       ========================================================= */

    :root {
      color-scheme: dark;

      --color-bg: #050507;
      --color-bg-deep: #010103;
      --color-panel: rgba(9, 9, 12, 0.72);
      --color-panel-soft: rgba(255, 255, 255, 0.035);
      --color-text: #f7f7f2;
      --color-muted: rgba(247, 247, 242, 0.68);
      --color-faint: rgba(247, 247, 242, 0.43);
      --color-line: rgba(247, 247, 242, 0.2);
      --color-line-strong: rgba(247, 247, 242, 0.24);
      --color-accent: #d51622;
      --color-accent-soft: rgba(213, 22, 34, 0.18);
      --color-accent-line: rgba(213, 22, 34, 0.58);

      --font-display: Audiowide, Orbitron, Rajdhani, "Segoe UI", Arial, sans-serif;

      --space-1: 0.5rem;
      --space-2: 0.75rem;
      --space-3: 1rem;
      --space-4: 1.5rem;
      --space-5: 2rem;
      --space-6: 3rem;

      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --tap-target: 48px;
      --frame-max: 44rem;
      --hub-max: 46rem;
      --stage-min-height: clamp(29rem, calc(100vh - 5.75rem), 52rem);
      --stage-min-height: clamp(29rem, calc(100svh - 5.75rem), 52rem);
      --title-size: 2rem;
      --kicker-size: 1rem;
      --button-text-size: 0.88rem;
      --footer-text-size: 0.78rem;
      --title-gap: 0.82rem;
      --lockup-gap: clamp(2.2rem, 7svh, 4.9rem);
      --portal-size: clamp(13.25rem, 68vw, 18.5rem);
      --portal-button-size: clamp(7rem, 34vw, 9rem);
      --portal-line: rgba(247, 247, 242, 0.2);
      --portal-line-soft: rgba(247, 247, 242, 0.12);
      --portal-red-line: rgba(213, 22, 34, 0.56);
      --ambient-grid-line: rgba(247, 247, 242, 0.028);
      --ambient-grid-red: rgba(213, 22, 34, 0.055);
      --ambient-ring-line: rgba(247, 247, 242, 0.075);
      --ambient-ring-red: rgba(213, 22, 34, 0.15);
      --motion-fast: 180ms;
      --motion-standard: 300ms;
      --motion-ambient: 18s;
      --motion-ambient-slow: 32s;
      --activation-duration: 1260ms;
      --portal-activation-scale: 1.32;
      --ease-standard: cubic-bezier(0.22, 0.72, 0.18, 1);
      --ease-breath: cubic-bezier(0.45, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--color-bg-deep);
    }

    body {
      min-width: 0;
      min-height: 100vh;
      min-height: 100svh;
      margin: 0;
      overflow-x: hidden;
      background: linear-gradient(180deg, #09090d 0%, var(--color-bg) 42%, var(--color-bg-deep) 100%);
      color: var(--color-text);
      font-family: var(--font-display);
      font-synthesis: none;
      letter-spacing: 0;
      text-rendering: optimizeLegibility;
    }

    button {
      font: inherit;
    }

    .site-shell {
      position: relative;
      min-width: 0;
      min-height: 100vh;
      min-height: 100svh;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      overflow: hidden;
      isolation: isolate;
    }

    .ambient-system,
    .ambient-system::before,
    .ambient-system::after,
    .cinema-fire-bg,
    .ambient-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .ambient-system {
      z-index: 0;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 50% 18%, rgba(247, 247, 242, 0.026), transparent min(48vw, 27rem)),
        radial-gradient(ellipse at 50% 76%, rgba(213, 22, 34, 0.17), transparent min(62vw, 40rem)),
        radial-gradient(circle at 50% 46%, rgba(213, 22, 34, 0.072), transparent min(54vw, 33rem)),
        radial-gradient(ellipse at 50% 102%, rgba(247, 247, 242, 0.055), transparent 35rem),
        linear-gradient(180deg, rgba(1, 1, 3, 0.92), rgba(5, 5, 7, 0.48) 54%, rgba(1, 1, 3, 0.9));
      contain: layout paint style;
    }

    .ambient-system::before,
    .ambient-system::after {
      content: "";
    }

    .ambient-system::before {
      z-index: 3;
      background:
        linear-gradient(var(--ambient-grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--ambient-grid-line) 1px, transparent 1px),
        linear-gradient(90deg, transparent 0 47%, var(--ambient-grid-red) 50%, transparent 53%) 50% 0 / min(62rem, 120vw) 100% no-repeat,
        linear-gradient(0deg, transparent 0 47%, rgba(247, 247, 242, 0.035) 50%, transparent 53%) 0 50% / 100% min(31rem, 86svh) no-repeat;
      background-size:
        42px 42px,
        42px 42px,
        min(62rem, 120vw) 100%,
        100% min(31rem, 86svh);
      opacity: 0.86;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.14));
    }

    .ambient-system::after {
      z-index: 5;
      opacity: 1;
      background:
        linear-gradient(180deg, rgba(1, 1, 3, 0.8), rgba(1, 1, 3, 0.2) 46%, rgba(1, 1, 3, 0.72)),
        radial-gradient(ellipse at 50% 42%, transparent 0 44%, rgba(0, 0, 0, 0.56) 100%),
        radial-gradient(ellipse at 50% 87%, rgba(213, 22, 34, 0.13), transparent min(68vw, 44rem)),
        repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.032) 0,
          rgba(255, 255, 255, 0.032) 1px,
          transparent 1px,
          transparent 5px
        );
    }

    .cinema-fire-bg {
      z-index: 0;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center bottom;
      opacity: 0.27;
      filter: brightness(0.34) contrast(1.12) saturate(0.66) blur(1px);
      transform: translateZ(0) scale(1.03);
      transition: opacity var(--motion-standard) var(--ease-standard), filter var(--motion-standard) var(--ease-standard);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, rgba(0, 0, 0, 0.13) 18%, rgba(0, 0, 0, 0.76) 50%, rgba(0, 0, 0, 0.92) 100%);
      mask-image: linear-gradient(to bottom, transparent 0%, rgba(0, 0, 0, 0.13) 18%, rgba(0, 0, 0, 0.76) 50%, rgba(0, 0, 0, 0.92) 100%);
    }

    .ambient-energy {
      z-index: 1;
      background:
        linear-gradient(90deg, transparent 0 48%, rgba(247, 247, 242, 0.038) 50%, transparent 52%) 50% 52% / min(42rem, 86vw) 66svh no-repeat,
        radial-gradient(ellipse at 50% 24%, rgba(247, 247, 242, 0.03), transparent min(42rem, 84vw)),
        radial-gradient(ellipse at 50% 84%, rgba(213, 22, 34, 0.21), transparent min(37rem, 74vw)),
        radial-gradient(circle at 50% 50%, rgba(213, 22, 34, 0.16), transparent min(32rem, 68vw)),
        radial-gradient(circle at 50% 50%, rgba(247, 247, 242, 0.045), transparent min(20rem, 48vw));
      opacity: 0.48;
      animation: ambientBreath var(--motion-ambient-slow) var(--ease-breath) infinite;
    }

    .ambient-rings {
      z-index: 2;
      inset: 50% auto auto 50%;
      width: min(78vw, 43rem);
      aspect-ratio: 1;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background:
        radial-gradient(circle, transparent 0 36%, var(--ambient-ring-red) 36.1% 36.3%, transparent 36.7%),
        radial-gradient(circle, transparent 0 52%, var(--ambient-ring-line) 52.1% 52.35%, transparent 52.8%),
        radial-gradient(circle, transparent 0 70%, rgba(247, 247, 242, 0.055) 70.1% 70.3%, transparent 70.75%),
        conic-gradient(from 12deg, transparent 0 18deg, rgba(213, 22, 34, 0.1) 19deg 20deg, transparent 21deg 94deg, rgba(247, 247, 242, 0.08) 95deg 96deg, transparent 97deg 180deg, rgba(213, 22, 34, 0.085) 181deg 182deg, transparent 183deg 360deg);
      opacity: 0.62;
      animation: ambientRingDrift 42s linear infinite;
    }

    .ambient-sweep {
      z-index: 4;
      inset: -20% auto auto -55%;
      width: 46%;
      height: 140%;
      background: linear-gradient(90deg, transparent, rgba(247, 247, 242, 0.045), transparent);
      opacity: 0.38;
      transform: skewX(-18deg) translate3d(-12%, 0, 0);
      animation: ambientSweep 28s var(--ease-breath) infinite;
    }

    .ambient-particles {
      z-index: 4;
      background:
        radial-gradient(circle, rgba(213, 22, 34, 0.55) 0 1px, transparent 1.6px) 18% 24% / 100% 100% no-repeat,
        radial-gradient(circle, rgba(247, 247, 242, 0.35) 0 1px, transparent 1.5px) 74% 22% / 100% 100% no-repeat,
        radial-gradient(circle, rgba(213, 22, 34, 0.4) 0 1px, transparent 1.5px) 58% 68% / 100% 100% no-repeat,
        radial-gradient(circle, rgba(247, 247, 242, 0.28) 0 1px, transparent 1.45px) 32% 78% / 100% 100% no-repeat,
        radial-gradient(circle, rgba(213, 22, 34, 0.34) 0 1px, transparent 1.45px) 86% 74% / 100% 100% no-repeat;
      opacity: 0.44;
      transform: translate3d(0, 0, 0);
      animation: ambientDust var(--motion-ambient) var(--ease-standard) infinite;
    }

    @keyframes ambientBreath {
      0%,
      100% {
        opacity: 0.36;
        transform: scale(1);
      }
      50% {
        opacity: 0.58;
        transform: translate3d(0, -0.18rem, 0) scale(1.035);
      }
    }

    @keyframes ambientRingDrift {
      from {
        transform: translate(-50%, -50%) rotate(0deg);
      }
      to {
        transform: translate(-50%, -50%) rotate(12deg);
      }
    }

    @keyframes ambientSweep {
      0%,
      62% {
        opacity: 0;
        transform: skewX(-18deg) translate3d(-12%, 0, 0);
      }
      78% {
        opacity: 0.28;
      }
      100% {
        opacity: 0;
        transform: skewX(-18deg) translate3d(360%, 0, 0);
      }
    }

    @keyframes ambientDust {
      0%,
      100% {
        opacity: 0.28;
        transform: translate3d(0, 0.3rem, 0);
      }
      50% {
        opacity: 0.46;
        transform: translate3d(0, -0.4rem, 0);
      }
    }

    .public-home {
      position: relative;
      z-index: 1;
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      align-items: safe center;
      justify-items: center;
      overflow-x: hidden;
      overflow-y: auto;
      padding:
        max(clamp(1rem, 2.8svh, 1.8rem), env(safe-area-inset-top))
        max(var(--space-3), env(safe-area-inset-right))
        clamp(1.1rem, 2.8svh, 1.9rem)
        max(var(--space-3), env(safe-area-inset-left));
    }

    .home-frame {
      grid-area: 1 / 1;
      position: relative;
      width: min(100%, var(--frame-max));
      min-height: var(--stage-min-height);
      display: grid;
      place-items: center;
      padding: clamp(2.35rem, 8.8svh, 5rem) clamp(1rem, 6vw, 3.5rem);
      border: 1px solid var(--color-line);
      border-radius: var(--radius-md);
      background:
        linear-gradient(180deg, var(--color-panel-soft), transparent 46%),
        var(--color-panel);
      box-shadow:
        inset 0 0 0 rgba(247, 247, 242, 0),
        0 0 0 rgba(213, 22, 34, 0);
      isolation: isolate;
      animation: shellIdleTrace 26s var(--ease-breath) infinite;
      transition:
        opacity var(--motion-standard) var(--ease-standard),
        transform var(--motion-standard) var(--ease-standard),
        border-color var(--motion-standard) var(--ease-standard),
        background-color var(--motion-standard) var(--ease-standard),
        box-shadow var(--motion-standard) var(--ease-standard);
    }

    .home-frame::before {
      position: absolute;
      inset: var(--space-2);
      z-index: -1;
      content: "";
      border: 1px solid rgba(213, 22, 34, 0.13);
      border-radius: var(--radius-sm);
      background:
        linear-gradient(90deg, transparent 0 14%, rgba(247, 247, 242, 0.08) 50%, transparent 86%) top / 100% 1px no-repeat,
        linear-gradient(90deg, transparent 0 18%, rgba(213, 22, 34, 0.09) 50%, transparent 82%) bottom / 100% 1px no-repeat,
        linear-gradient(180deg, transparent 0 18%, rgba(247, 247, 242, 0.06) 50%, transparent 82%) left / 1px 100% no-repeat,
        linear-gradient(180deg, transparent 0 18%, rgba(213, 22, 34, 0.08) 50%, transparent 82%) right / 1px 100% no-repeat;
      opacity: 0.78;
      animation: shellInnerTrace 18s var(--ease-breath) infinite;
    }

    .home-frame::after {
      position: absolute;
      inset: var(--space-2);
      z-index: -1;
      content: "";
      border-radius: var(--radius-sm);
      background:
        linear-gradient(180deg, transparent 6%, rgba(247, 247, 242, 0.03) 35%, rgba(213, 22, 34, 0.09) 61%, transparent 88%) 50% 50% / 1px 100% no-repeat,
        radial-gradient(ellipse at 50% 66%, rgba(213, 22, 34, 0.08), transparent min(48vw, 24rem)),
        radial-gradient(ellipse at 50% 82%, rgba(247, 247, 242, 0.035), transparent min(54vw, 28rem));
      opacity: 0.82;
      animation: chamberDepthDrift 28s var(--ease-breath) infinite;
    }

    .home-lockup {
      width: 100%;
      max-width: 38rem;
      min-width: 0;
      display: grid;
      justify-items: center;
      align-content: center;
      gap: var(--lockup-gap);
      min-height: clamp(20rem, 58svh, 35rem);
      text-align: center;
    }

    .title-group {
      display: grid;
      justify-items: center;
      gap: var(--title-gap);
      min-width: 0;
      transition:
        opacity var(--motion-standard) var(--ease-standard),
        transform var(--motion-standard) var(--ease-standard);
    }

    .title-kicker {
      margin: 0;
      color: var(--color-text);
      font-family: var(--font-display);
      font-size: var(--kicker-size);
      font-weight: 400;
      line-height: 1.08;
      text-transform: uppercase;
    }

    .home-title {
      max-width: 100%;
      margin: 0;
      color: var(--color-text);
      font-family: var(--font-display);
      font-size: clamp(1.28rem, 6.35vw, var(--title-size));
      font-weight: 400;
      line-height: 1;
      text-transform: none;
      white-space: nowrap;
    }

    .start-portal {
      position: relative;
      width: min(100%, var(--portal-size));
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      overflow: hidden;
      border: 1px solid var(--portal-line);
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 54%, rgba(1, 1, 3, 0.9) 0 30%, transparent 48%),
        radial-gradient(circle at 50% 58%, rgba(247, 247, 242, 0.055), transparent 35%),
        radial-gradient(circle at 50% 72%, rgba(213, 22, 34, 0.16), transparent 58%),
        linear-gradient(90deg, transparent calc(50% - 0.5px), var(--portal-line-soft) 50%, transparent calc(50% + 0.5px)),
        linear-gradient(0deg, transparent calc(50% - 0.5px), var(--portal-line-soft) 50%, transparent calc(50% + 0.5px)),
        radial-gradient(circle, transparent 0 36%, rgba(0, 0, 0, 0.5) 38%, transparent 50%),
        radial-gradient(circle, transparent 0 43%, rgba(213, 22, 34, 0.2) 43.3% 43.7%, transparent 44%),
        conic-gradient(from 18deg, transparent 0 58deg, rgba(247, 247, 242, 0.045) 59deg 60deg, transparent 61deg 142deg, rgba(213, 22, 34, 0.075) 143deg 144deg, transparent 145deg 250deg, rgba(247, 247, 242, 0.035) 251deg 252deg, transparent 253deg 360deg),
        rgba(5, 5, 7, 0.2);
      box-shadow:
        inset 0 0 2.35rem rgba(0, 0, 0, 0.82),
        inset 0 0 0.85rem rgba(247, 247, 242, 0.035),
        0 1.35rem 3rem rgba(0, 0, 0, 0.48),
        0 0 3.5rem rgba(213, 22, 34, 0.055);
      isolation: isolate;
      transform: translateZ(0) scale(1);
      transition:
        transform var(--activation-duration) var(--ease-standard),
        border-color var(--motion-standard) var(--ease-standard),
        background-color var(--motion-standard) var(--ease-standard),
        box-shadow var(--motion-standard) var(--ease-standard),
        opacity var(--motion-standard) var(--ease-standard);
    }

    .start-portal::before,
    .start-portal::after {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      content: "";
    }

    .start-portal::before {
      inset: clamp(1.05rem, 5vw, 1.45rem);
      border: 1px solid var(--portal-line-soft);
      background: conic-gradient(
        from -9deg,
        transparent 0 38deg,
        rgba(247, 247, 242, 0.16) 39deg 40deg,
        transparent 41deg 126deg,
        rgba(213, 22, 34, 0.12) 127deg 128deg,
        transparent 129deg 178deg,
        rgba(213, 22, 34, 0.2) 179deg 180deg,
        transparent 181deg 294deg,
        rgba(247, 247, 242, 0.09) 295deg 296deg,
        transparent 297deg 360deg
      );
      opacity: 0.86;
      animation: portalDormantDrift 38s var(--ease-breath) infinite alternate;
      transition:
        border-color var(--motion-standard) var(--ease-standard),
        opacity var(--motion-standard) var(--ease-standard);
    }

    .start-portal::after {
      inset: clamp(2.05rem, 8.5vw, 3rem);
      border: 1px solid var(--portal-red-line);
      opacity: 0.88;
      background:
        radial-gradient(circle, transparent 0 58%, rgba(213, 22, 34, 0.13) 58.4% 58.9%, transparent 59.3%),
        conic-gradient(from 42deg, transparent 0 84deg, rgba(213, 22, 34, 0.12) 85deg 86deg, transparent 87deg 226deg, rgba(247, 247, 242, 0.06) 227deg 228deg, transparent 229deg 360deg);
      box-shadow:
        inset 0 0 1.2rem rgba(0, 0, 0, 0.56),
        0 0 1.6rem rgba(213, 22, 34, 0.06);
      animation: portalInnerBreath 18s var(--ease-breath) infinite;
      transition:
        inset var(--activation-duration) var(--ease-standard),
        border-color var(--motion-standard) var(--ease-standard),
        opacity var(--motion-standard) var(--ease-standard);
    }

    .start-button {
      position: relative;
      z-index: 1;
      width: var(--portal-button-size);
      min-width: var(--tap-target);
      aspect-ratio: 1;
      display: inline-grid;
      place-items: center;
      border: 1px solid var(--color-accent-line);
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 42%, rgba(247, 247, 242, 0.12), transparent 36%),
        radial-gradient(circle at 50% 70%, rgba(213, 22, 34, 0.2), transparent 70%),
        rgba(5, 5, 7, 0.86);
      box-shadow:
        inset 0 0 1.15rem rgba(0, 0, 0, 0.82),
        0 0 1.4rem rgba(213, 22, 34, 0.08);
      color: var(--color-text);
      cursor: pointer;
      font-family: var(--font-display);
      font-size: var(--button-text-size);
      letter-spacing: 0;
      text-transform: uppercase;
      transition:
        border-color var(--motion-fast) var(--ease-standard),
        background-color var(--motion-fast) var(--ease-standard),
        color var(--motion-fast) var(--ease-standard),
        opacity var(--motion-fast) var(--ease-standard),
        transform var(--motion-fast) var(--ease-standard);
      transform: translateZ(0) scale(1);
      overflow: hidden;
    }

    .start-button::before {
      position: absolute;
      inset: 14%;
      content: "";
      border-radius: inherit;
      background: linear-gradient(105deg, transparent 18%, rgba(247, 247, 242, 0.5) 50%, transparent 82%);
      opacity: 0;
      pointer-events: none;
      transform: translate3d(-130%, 0, 0) rotate(10deg);
    }

    .start-button:hover {
      border-color: var(--color-text);
      background-color: rgba(213, 22, 34, 0.1);
    }

    .start-button:focus-visible {
      outline: 2px solid var(--color-text);
      outline-offset: 0.4rem;
    }

    .start-button:disabled {
      cursor: wait;
    }

    .status-row {
      position: relative;
      z-index: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--space-2) var(--space-3);
      padding:
        0.85rem
        max(var(--space-3), env(safe-area-inset-right))
        max(0.85rem, env(safe-area-inset-bottom))
        max(var(--space-3), env(safe-area-inset-left));
      border-top: 1px solid rgba(247, 247, 242, 0.1);
      color: var(--color-faint);
      font-family: var(--font-display);
      font-size: var(--footer-text-size);
      font-weight: 400;
      line-height: 1.25;
      text-transform: uppercase;
      transition:
        opacity var(--motion-standard) var(--ease-standard),
        color var(--motion-standard) var(--ease-standard);
    }

    .status-row span {
      flex: 0 0 auto;
      min-width: max-content;
      white-space: nowrap;
    }

    .status-label {
      color: rgba(247, 247, 242, 0.34);
    }

    .status-value {
      color: rgba(247, 247, 242, 0.52);
    }

    .status-value--standby,
    .status-value--version {
      color: rgba(213, 22, 34, 0.74);
      text-shadow: 0 0 0.55rem rgba(213, 22, 34, 0.08);
      animation: statusIdlePulse 9.5s var(--ease-breath) infinite;
    }

    .status-value--version {
      animation-delay: -3.2s;
      animation-duration: 11.25s;
    }

    .portfolio-hub {
      grid-area: 1 / 1;
      position: relative;
      width: min(100%, var(--hub-max));
      min-height: var(--stage-min-height);
      display: grid;
      align-content: center;
      justify-items: center;
      gap: clamp(2rem, 7svh, 4.5rem);
      padding: clamp(1.1rem, 4vw, 2rem);
      border: 1px solid rgba(247, 247, 242, 0.22);
      border-radius: var(--radius-md);
      background:
        linear-gradient(180deg, rgba(247, 247, 242, 0.04), transparent 42%),
        linear-gradient(135deg, rgba(213, 22, 34, 0.075), transparent 38%),
        rgba(6, 6, 9, 0.78);
      opacity: 0;
      pointer-events: none;
      transform: translate3d(0, 0.7rem, 0) scale(0.975);
      transition:
        opacity 520ms var(--ease-standard) 120ms,
        transform 620ms var(--ease-standard) 120ms,
        border-color 520ms var(--ease-standard) 120ms;
      isolation: isolate;
    }

    .portfolio-hub::before {
      position: absolute;
      inset: var(--space-2);
      z-index: -1;
      content: "";
      border: 1px solid rgba(213, 22, 34, 0.14);
      border-radius: var(--radius-sm);
      background:
        linear-gradient(90deg, transparent 0 45%, rgba(247, 247, 242, 0.07) 50%, transparent 55%) top / 100% 1px no-repeat,
        linear-gradient(180deg, transparent 0 45%, rgba(213, 22, 34, 0.12) 50%, transparent 55%) left / 1px 100% no-repeat;
    }

    .hub-header {
      display: grid;
      justify-items: center;
      gap: 0.65rem;
      min-width: 0;
      text-align: center;
    }

    .hub-kicker {
      margin: 0;
      color: var(--color-muted);
      font-size: clamp(0.78rem, 3vw, 0.98rem);
      line-height: 1;
      text-transform: uppercase;
    }

    .hub-title {
      max-width: 100%;
      margin: 0;
      color: var(--color-text);
      font-size: clamp(1.55rem, 8vw, 2.8rem);
      font-weight: 400;
      line-height: 1.05;
      text-wrap: balance;
    }

    .hub-future-mount {
      position: relative;
      width: min(100%, 22rem);
      min-height: clamp(8rem, 22svh, 13rem);
      display: grid;
      place-items: center;
      border: 1px solid rgba(247, 247, 242, 0.12);
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(213, 22, 34, 0.11), transparent 58%),
        radial-gradient(circle, transparent 0 58%, rgba(247, 247, 242, 0.08) 58.4% 58.8%, transparent 59.2%),
        rgba(5, 5, 7, 0.18);
      overflow: hidden;
    }

    .hub-future-mount::before,
    .hub-future-mount::after {
      position: absolute;
      inset: 15%;
      content: "";
      border: 1px solid rgba(213, 22, 34, 0.22);
      border-radius: inherit;
      pointer-events: none;
    }

    .hub-future-mount::after {
      inset: 32%;
      border-color: rgba(247, 247, 242, 0.12);
    }

    .hub-status {
      position: relative;
      z-index: 1;
      color: var(--color-muted);
      font-size: clamp(0.72rem, 2.8vw, 0.88rem);
      line-height: 1;
      text-transform: uppercase;
    }

    .site-shell.is-activating .ambient-energy {
      opacity: 0.72;
      animation-duration: 7s;
    }

    .site-shell.is-activating .ambient-rings {
      opacity: 0.84;
      animation-duration: 9s;
    }

    .site-shell.is-activating .cinema-fire-bg {
      opacity: 0.31;
      filter: brightness(0.4) contrast(1.12) saturate(0.7) blur(1px);
    }

    .site-shell.is-activating .ambient-system::after {
      opacity: 0.86;
    }

    .site-shell.is-activating .home-frame {
      opacity: 0.82;
      border-color: rgba(213, 22, 34, 0.34);
      background-color: rgba(9, 9, 12, 0.42);
      box-shadow:
        inset 0 0 1.35rem rgba(213, 22, 34, 0.045),
        0 0 3rem rgba(213, 22, 34, 0.08);
    }

    .site-shell.is-activating .home-frame::before {
      opacity: 1;
      animation-duration: 5s;
    }

    .site-shell.is-activating .home-frame::after {
      opacity: 0.96;
      animation-duration: 8s;
    }

    .site-shell.is-activating .title-group {
      opacity: 0.46;
      transform: translate3d(0, -0.24rem, 0);
    }

    .site-shell.is-activating .status-row {
      opacity: 0.42;
      color: rgba(247, 247, 242, 0.34);
    }

    .site-shell.is-activating .start-portal {
      border-color: rgba(247, 247, 242, 0.42);
      background-color: rgba(213, 22, 34, 0.06);
      box-shadow:
        inset 0 0 2.8rem rgba(0, 0, 0, 0.86),
        inset 0 0 1.1rem rgba(247, 247, 242, 0.055),
        0 1.5rem 3.4rem rgba(0, 0, 0, 0.52),
        0 0 4.2rem rgba(213, 22, 34, 0.12);
      transform: translateZ(0) scale(var(--portal-activation-scale));
    }

    .site-shell.is-activating .start-portal::before {
      border-color: rgba(247, 247, 242, 0.28);
      opacity: 0.96;
      animation: portalRingSpin 640ms linear infinite;
    }

    .site-shell.is-activating .start-portal::after {
      inset: clamp(1.45rem, 6vw, 2.2rem);
      border-color: rgba(213, 22, 34, 0.82);
      opacity: 1;
      animation: portalRedPulse 780ms var(--ease-standard) infinite;
    }

    .site-shell.is-activating .start-button {
      border-color: rgba(247, 247, 242, 0.8);
      background-color: rgba(213, 22, 34, 0.16);
      color: #ffffff;
      opacity: 0.95;
      transform: translateZ(0) scale(0.91);
    }

    .site-shell.is-activating .start-button::before {
      animation: activationSweep 820ms var(--ease-standard) both;
    }

    .site-shell.is-reduced-activation .home-frame,
    .site-shell.is-reduced-activation .title-group,
    .site-shell.is-reduced-activation .status-row {
      opacity: 0.72;
      transform: none;
    }

    .site-shell.is-reduced-activation .start-portal {
      transform: translateZ(0) scale(1.03);
    }

    .site-shell.is-reduced-activation .start-portal::before,
    .site-shell.is-reduced-activation .start-portal::after,
    .site-shell.is-reduced-activation .start-button::before {
      animation: none;
    }

    .site-shell.has-entered-hub .home-frame {
      opacity: 0;
      pointer-events: none;
      transform: translate3d(0, -0.35rem, 0) scale(0.965);
    }

    .site-shell.has-entered-hub .portfolio-hub {
      opacity: 1;
      pointer-events: auto;
      transform: translate3d(0, 0, 0) scale(1);
    }

    .site-shell.has-entered-hub .ambient-energy {
      opacity: 0.64;
    }

    .site-shell.has-entered-hub .ambient-rings {
      opacity: 0.72;
      animation-duration: 34s;
    }

    .site-shell.has-entered-hub .cinema-fire-bg {
      opacity: 0.29;
      filter: brightness(0.37) contrast(1.1) saturate(0.68) blur(1px);
    }

    @keyframes shellIdleTrace {
      0%,
      100% {
        border-color: rgba(247, 247, 242, 0.16);
        box-shadow:
          inset 0 0 0 rgba(247, 247, 242, 0),
          0 0 0 rgba(213, 22, 34, 0);
      }
      46% {
        border-color: rgba(247, 247, 242, 0.22);
        box-shadow:
          inset 0 0 0.8rem rgba(247, 247, 242, 0.018),
          0 0 1.8rem rgba(213, 22, 34, 0.035);
      }
      72% {
        border-color: rgba(213, 22, 34, 0.22);
        box-shadow:
          inset 0 0 0.6rem rgba(213, 22, 34, 0.025),
          0 0 1.4rem rgba(213, 22, 34, 0.03);
      }
    }

    @keyframes shellInnerTrace {
      0%,
      100% {
        opacity: 0.56;
        transform: scale(1);
      }
      44% {
        opacity: 0.84;
        transform: scale(1.001);
      }
      72% {
        opacity: 0.68;
        transform: scale(1);
      }
    }

    @keyframes chamberDepthDrift {
      0%,
      100% {
        opacity: 0.72;
        transform: translate3d(0, 0.16rem, 0) scaleY(1);
      }
      50% {
        opacity: 0.88;
        transform: translate3d(0, -0.1rem, 0) scaleY(1.01);
      }
    }

    @keyframes portalDormantDrift {
      0% {
        transform: rotate(0deg) scale(1);
      }
      48% {
        transform: rotate(5deg) scale(1.002);
      }
      100% {
        transform: rotate(11deg) scale(1);
      }
    }

    @keyframes portalInnerBreath {
      0%,
      100% {
        opacity: 0.72;
        transform: scale(0.992);
      }
      50% {
        opacity: 0.88;
        transform: scale(1.008);
      }
    }

    @keyframes statusIdlePulse {
      0%,
      18%,
      100% {
        opacity: 0.58;
        text-shadow: 0 0 0.45rem rgba(213, 22, 34, 0.05);
      }
      43% {
        opacity: 0.76;
        text-shadow: 0 0 0.62rem rgba(213, 22, 34, 0.12);
      }
      57% {
        opacity: 0.66;
        text-shadow: 0 0 0.5rem rgba(213, 22, 34, 0.08);
      }
      83% {
        opacity: 0.82;
        text-shadow: 0 0 0.7rem rgba(213, 22, 34, 0.13);
      }
    }

    @keyframes portalRingSpin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(180deg);
      }
    }

    @keyframes portalRedPulse {
      0%,
      100% {
        opacity: 0.7;
        transform: scale(0.98);
      }
      50% {
        opacity: 1;
        transform: scale(1.04);
      }
    }

    @keyframes activationSweep {
      0% {
        opacity: 0;
        transform: translate3d(-130%, 0, 0) rotate(10deg);
      }
      32% {
        opacity: 0.55;
      }
      100% {
        opacity: 0;
        transform: translate3d(130%, 0, 0) rotate(10deg);
      }
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 360px) {
      :root {
        --title-size: 1.88rem;
        --kicker-size: 0.94rem;
        --footer-text-size: 0.64rem;
        --stage-min-height: clamp(27rem, calc(100vh - 5.25rem), 48rem);
        --stage-min-height: clamp(27rem, calc(100svh - 5.25rem), 48rem);
        --lockup-gap: clamp(1.75rem, 5svh, 2.55rem);
        --portal-size: clamp(12.5rem, 67vw, 13.25rem);
        --portal-button-size: clamp(6.45rem, 33vw, 7rem);
        --portal-activation-scale: 1.22;
      }

      .ambient-particles {
        opacity: 0.24;
      }

      .cinema-fire-bg {
        opacity: 0.16;
      }

      .ambient-rings {
        width: min(88vw, 22rem);
      }

      .home-frame {
        padding-inline: var(--space-3);
      }

      .home-title {
        font-size: clamp(1.02rem, 5.35vw, 1.22rem);
      }

      .home-lockup {
        min-height: clamp(18.5rem, 54svh, 30rem);
      }

      .portfolio-hub {
        padding: var(--space-3);
      }

      .status-row {
        gap: 0.35rem;
        justify-content: space-between;
        padding-right: max(var(--space-2), env(safe-area-inset-right));
        padding-left: max(var(--space-2), env(safe-area-inset-left));
        text-align: center;
      }
    }

    @media (max-width: 479px) {
      .status-row {
        justify-content: space-between;
        text-align: center;
      }
    }

    @media (min-width: 480px) {
      :root {
        --title-size: 2.65rem;
        --kicker-size: 1.06rem;
        --button-text-size: 0.92rem;
        --portal-size: clamp(15rem, 54vw, 17rem);
      }
    }

    @media (min-width: 620px) {
      :root {
        --title-size: 3.25rem;
        --kicker-size: 1.1rem;
      }
    }

    @media (min-width: 760px) {
      :root {
        --title-size: 4.35rem;
        --kicker-size: 1.12rem;
        --button-text-size: 0.94rem;
        --footer-text-size: 0.84rem;
        --title-gap: 0.95rem;
        --lockup-gap: clamp(2.75rem, 7svh, 5.15rem);
        --portal-size: clamp(17rem, 28vw, 19.25rem);
        --portal-button-size: clamp(8.25rem, 14vw, 9.25rem);
        --portal-activation-scale: 1.46;
      }

      .public-home {
        padding-inline: max(var(--space-5), env(safe-area-inset-left));
      }

      .status-row {
        justify-content: space-between;
        text-align: left;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      :root {
        --activation-duration: 420ms;
        --portal-activation-scale: 1.03;
      }

      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }

      .ambient-energy {
        opacity: 0.34;
        transform: none;
      }

      .home-frame::after {
        opacity: 0.58;
        transform: none;
      }

      .home-frame,
      .home-frame::before {
        animation: none !important;
      }

      .cinema-fire-bg,
      .site-shell.is-activating .cinema-fire-bg,
      .site-shell.has-entered-hub .cinema-fire-bg {
        opacity: 0.1;
        filter: brightness(0.22) contrast(1) saturate(0.42) blur(1.5px);
      }

      .ambient-sweep,
      .ambient-particles {
        display: none;
      }

      .start-portal::before,
      .start-portal::after,
      .home-frame::after,
      .status-value--standby,
      .status-value--version {
        animation: none !important;
      }

      .site-shell.is-activating .home-frame,
      .site-shell.is-activating .title-group,
      .site-shell.is-activating .status-row {
        opacity: 0.72;
        transform: none;
      }

      .portfolio-hub,
      .site-shell.has-entered-hub .portfolio-hub,
      .site-shell.has-entered-hub .home-frame {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div class="site-shell">
    <div class="ambient-system" aria-hidden="true">
      <video class="cinema-fire-bg" autoplay muted loop playsinline aria-hidden="true" preload="metadata">
        <source src="./assets/media/background/background-fire.mp4" type="video/mp4">
      </video>
      <span class="ambient-layer ambient-energy"></span>
      <span class="ambient-layer ambient-rings"></span>
      <span class="ambient-layer ambient-sweep"></span>
      <span class="ambient-layer ambient-particles"></span>
    </div>

    <main class="public-home" aria-labelledby="home-title">
      <section class="home-frame" aria-label="Voodoo Media public homepage">
        <div class="home-lockup">
          <div class="title-group">
            <p class="title-kicker">Welcome To</p>
            <h1 class="home-title" id="home-title">Voodoo Media</h1>
          </div>

          <div class="start-portal">
            <button
              class="start-button"
              type="button"
              aria-label="Start Voodoo Media"
              aria-describedby="start-description"
            >
              Start
            </button>
          </div>
          <span class="sr-only" id="start-description">Placeholder start control centered inside the VMPix V3 portal shell.</span>
        </div>
      </section>

      <section class="portfolio-hub" aria-labelledby="portfolio-title" aria-hidden="true">
        <div class="hub-header">
          <p class="hub-kicker">Interactive Portfolio</p>
          <h2 class="hub-title" id="portfolio-title">Nexus Awaiting Input</h2>
        </div>

        <!-- Future Interactive Portfolio Hub mount:
             keep this container empty in Homepage v1.
             Future work will decide the real module selection system. -->
        <div class="hub-future-mount" data-future-hub-mount aria-label="Future Interactive Portfolio Hub mount">
          <span class="hub-status">System Ready</span>
        </div>
      </section>
    </main>

    <footer class="status-row" aria-label="Homepage status">
      <span><span class="status-label">System Status:</span> <span class="status-value status-value--standby">Standby</span></span>
      <span><span class="status-label">Version</span> <span class="status-value status-value--version">3.0</span></span>
    </footer>
  </div>

  <script>
    (() => {
      const shell = document.querySelector(".site-shell");
      const startButton = document.querySelector(".start-button");
      const homeFrame = document.querySelector(".home-frame");
      const portfolioHub = document.querySelector(".portfolio-hub");
      const fireVideo = document.querySelector(".cinema-fire-bg");
      const reducedMotion = window.matchMedia
        ? window.matchMedia("(prefers-reduced-motion: reduce)")
        : { matches: false };
      let activationTimer;

      function syncAmbientMotion() {
        if (!fireVideo) {
          return;
        }

        if (reducedMotion.matches) {
          fireVideo.pause();
          return;
        }

        const playback = fireVideo.play();
        if (playback && typeof playback.catch === "function") {
          playback.catch(() => {});
        }
      }

      function revealHub() {
        shell.classList.remove("is-activating", "is-reduced-activation");
        shell.classList.add("has-entered-hub");
        if (homeFrame) {
          homeFrame.setAttribute("aria-hidden", "true");
        }
        if (portfolioHub) {
          portfolioHub.setAttribute("aria-hidden", "false");
        }
        startButton.setAttribute("aria-busy", "false");
      }

      function activatePortal() {
        if (
          !shell ||
          !startButton ||
          startButton.disabled ||
          shell.classList.contains("is-activating") ||
          shell.classList.contains("has-entered-hub")
        ) {
          return;
        }

        window.clearTimeout(activationTimer);
        startButton.disabled = true;
        startButton.setAttribute("aria-busy", "true");
        shell.classList.toggle("is-reduced-activation", reducedMotion.matches);
        shell.classList.add("is-activating");

        activationTimer = window.setTimeout(revealHub, reducedMotion.matches ? 460 : 1360);
      }

      if (shell && startButton) {
        startButton.setAttribute("aria-busy", "false");
        startButton.addEventListener("click", activatePortal);
        syncAmbientMotion();
        if (typeof reducedMotion.addEventListener === "function") {
          reducedMotion.addEventListener("change", syncAmbientMotion);
        } else if (typeof reducedMotion.addListener === "function") {
          reducedMotion.addListener(syncAmbientMotion);
        }
        window.addEventListener("pagehide", () => window.clearTimeout(activationTimer));
      }
    })();
  </script>
</body>
</html>
