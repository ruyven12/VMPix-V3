<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050507">
  <title>Voodoo Media | VMPix V3</title>

  <!-- Future pass: self-host Audiowide in assets/fonts if offline font delivery is preferred. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">

  <style>
    /* =========================================================
       VMPix V3 Public Homepage Shell - Pass 4
       Static foundation only. No routes, APIs, modules, or transitions.
       ========================================================= */

    :root {
      color-scheme: dark;

      --color-bg: #050507;
      --color-bg-deep: #010103;
      --color-panel: rgba(9, 9, 12, 0.72);
      --color-panel-soft: rgba(255, 255, 255, 0.035);
      --color-text: #f7f7f2;
      --color-muted: rgba(247, 247, 242, 0.68);
      --color-faint: rgba(247, 247, 242, 0.43);
      --color-line: rgba(247, 247, 242, 0.2);
      --color-line-strong: rgba(247, 247, 242, 0.42);
      --color-accent: #d51622;
      --color-accent-soft: rgba(213, 22, 34, 0.18);
      --color-accent-line: rgba(213, 22, 34, 0.58);

      --font-display: Audiowide, Orbitron, Rajdhani, "Segoe UI", Arial, sans-serif;

      --space-1: 0.5rem;
      --space-2: 0.75rem;
      --space-3: 1rem;
      --space-4: 1.5rem;
      --space-5: 2rem;
      --space-6: 3rem;

      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --tap-target: 48px;
      --frame-max: 44rem;
      --title-size: 2rem;
      --kicker-size: 1rem;
      --button-text-size: 0.88rem;
      --footer-text-size: 0.68rem;
      --title-gap: 0.82rem;
      --lockup-gap: clamp(1.85rem, 5svh, 3rem);
      --portal-size: clamp(13.25rem, 68vw, 18.5rem);
      --portal-button-size: clamp(7rem, 34vw, 9rem);
      --portal-line: rgba(247, 247, 242, 0.2);
      --portal-line-soft: rgba(247, 247, 242, 0.12);
      --portal-red-line: rgba(213, 22, 34, 0.56);
      --ambient-grid-line: rgba(247, 247, 242, 0.028);
      --ambient-grid-red: rgba(213, 22, 34, 0.055);
      --ambient-ring-line: rgba(247, 247, 242, 0.075);
      --ambient-ring-red: rgba(213, 22, 34, 0.15);
      --motion-fast: 160ms;
      --motion-standard: 240ms;
      --motion-ambient: 12s;
      --motion-ambient-slow: 20s;
      --ease-standard: cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--color-bg-deep);
    }

    body {
      min-width: 320px;
      min-height: 100vh;
      min-height: 100svh;
      margin: 0;
      overflow-x: hidden;
      background: linear-gradient(180deg, #09090d 0%, var(--color-bg) 42%, var(--color-bg-deep) 100%);
      color: var(--color-text);
      font-family: var(--font-display);
      font-synthesis: none;
      letter-spacing: 0;
      text-rendering: optimizeLegibility;
    }

    button {
      font: inherit;
    }

    .site-shell {
      position: relative;
      min-height: 100vh;
      min-height: 100svh;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      overflow: hidden;
      isolation: isolate;
    }

    .ambient-system,
    .ambient-system::before,
    .ambient-system::after,
    .ambient-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .ambient-system {
      z-index: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 46%, rgba(213, 22, 34, 0.075), transparent min(54vw, 33rem)),
        radial-gradient(circle at 50% 100%, rgba(247, 247, 242, 0.035), transparent 32rem);
      contain: layout paint style;
    }

    .ambient-system::before,
    .ambient-system::after {
      content: "";
    }

    .ambient-system::before {
      background:
        linear-gradient(var(--ambient-grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--ambient-grid-line) 1px, transparent 1px),
        linear-gradient(90deg, transparent 0 47%, var(--ambient-grid-red) 50%, transparent 53%) 50% 0 / min(62rem, 120vw) 100% no-repeat,
        linear-gradient(0deg, transparent 0 47%, rgba(247, 247, 242, 0.035) 50%, transparent 53%) 0 50% / 100% min(31rem, 86svh) no-repeat;
      background-size:
        42px 42px,
        42px 42px,
        min(62rem, 120vw) 100%,
        100% min(31rem, 86svh);
      opacity: 0.86;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.14));
    }

    .ambient-system::after {
      opacity: 0.18;
      background:
        radial-gradient(ellipse at center, transparent 0 50%, rgba(0, 0, 0, 0.56) 100%),
        repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.055) 0,
          rgba(255, 255, 255, 0.055) 1px,
          transparent 1px,
          transparent 5px
        );
    }

    .ambient-energy {
      background:
        radial-gradient(circle at 50% 46%, rgba(213, 22, 34, 0.2), transparent min(32rem, 68vw)),
        radial-gradient(circle at 50% 50%, rgba(247, 247, 242, 0.045), transparent min(20rem, 48vw));
      opacity: 0.48;
      animation: ambientBreath var(--motion-ambient-slow) var(--ease-standard) infinite;
    }

    .ambient-rings {
      inset: 50% auto auto 50%;
      width: min(78vw, 43rem);
      aspect-ratio: 1;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background:
        radial-gradient(circle, transparent 0 36%, var(--ambient-ring-red) 36.1% 36.3%, transparent 36.7%),
        radial-gradient(circle, transparent 0 52%, var(--ambient-ring-line) 52.1% 52.35%, transparent 52.8%),
        radial-gradient(circle, transparent 0 70%, rgba(247, 247, 242, 0.055) 70.1% 70.3%, transparent 70.75%),
        conic-gradient(from 12deg, transparent 0 18deg, rgba(213, 22, 34, 0.1) 19deg 20deg, transparent 21deg 94deg, rgba(247, 247, 242, 0.08) 95deg 96deg, transparent 97deg 180deg, rgba(213, 22, 34, 0.085) 181deg 182deg, transparent 183deg 360deg);
      opacity: 0.62;
      animation: ambientRingDrift var(--motion-ambient-slow) linear infinite;
    }

    .ambient-sweep {
      inset: -20% auto auto -55%;
      width: 46%;
      height: 140%;
      background: linear-gradient(90deg, transparent, rgba(247, 247, 242, 0.045), transparent);
      opacity: 0.46;
      transform: skewX(-18deg) translate3d(-12%, 0, 0);
      animation: ambientSweep 18s var(--ease-standard) infinite;
    }

    .ambient-particles {
      background:
        radial-gradient(circle, rgba(213, 22, 34, 0.55) 0 1px, transparent 1.6px) 18% 24% / 100% 100% no-repeat,
        radial-gradient(circle, rgba(247, 247, 242, 0.35) 0 1px, transparent 1.5px) 74% 22% / 100% 100% no-repeat,
        radial-gradient(circle, rgba(213, 22, 34, 0.4) 0 1px, transparent 1.5px) 58% 68% / 100% 100% no-repeat,
        radial-gradient(circle, rgba(247, 247, 242, 0.28) 0 1px, transparent 1.45px) 32% 78% / 100% 100% no-repeat,
        radial-gradient(circle, rgba(213, 22, 34, 0.34) 0 1px, transparent 1.45px) 86% 74% / 100% 100% no-repeat;
      opacity: 0.44;
      transform: translate3d(0, 0, 0);
      animation: ambientDust var(--motion-ambient) var(--ease-standard) infinite;
    }

    @keyframes ambientBreath {
      0%,
      100% {
        opacity: 0.36;
        transform: scale(1);
      }
      50% {
        opacity: 0.58;
        transform: scale(1.035);
      }
    }

    @keyframes ambientRingDrift {
      from {
        transform: translate(-50%, -50%) rotate(0deg);
      }
      to {
        transform: translate(-50%, -50%) rotate(12deg);
      }
    }

    @keyframes ambientSweep {
      0%,
      62% {
        opacity: 0;
        transform: skewX(-18deg) translate3d(-12%, 0, 0);
      }
      78% {
        opacity: 0.38;
      }
      100% {
        opacity: 0;
        transform: skewX(-18deg) translate3d(360%, 0, 0);
      }
    }

    @keyframes ambientDust {
      0%,
      100% {
        opacity: 0.28;
        transform: translate3d(0, 0.3rem, 0);
      }
      50% {
        opacity: 0.46;
        transform: translate3d(0, -0.4rem, 0);
      }
    }

    .public-home {
      position: relative;
      z-index: 1;
      min-width: 0;
      min-height: 0;
      display: grid;
      place-items: center;
      padding:
        max(var(--space-4), env(safe-area-inset-top))
        max(var(--space-3), env(safe-area-inset-right))
        var(--space-4)
        max(var(--space-3), env(safe-area-inset-left));
    }

    .home-frame {
      position: relative;
      width: min(100%, var(--frame-max));
      min-height: clamp(24rem, 66svh, 38rem);
      display: grid;
      place-items: center;
      padding: clamp(2rem, 8svh, 4rem) clamp(1rem, 6vw, 3.5rem);
      border: 1px solid var(--color-line);
      border-radius: var(--radius-md);
      background:
        linear-gradient(180deg, var(--color-panel-soft), transparent 46%),
        var(--color-panel);
      isolation: isolate;
    }

    .home-frame::before {
      position: absolute;
      inset: var(--space-2);
      z-index: -1;
      content: "";
      border: 1px solid rgba(213, 22, 34, 0.12);
      border-radius: var(--radius-sm);
      background:
        linear-gradient(90deg, transparent 0 44%, rgba(213, 22, 34, 0.12) 50%, transparent 56%) top / 100% 1px no-repeat,
        linear-gradient(180deg, transparent 0 44%, rgba(247, 247, 242, 0.08) 50%, transparent 56%) left / 1px 100% no-repeat;
    }

    .frame-corner {
      position: absolute;
      width: clamp(2.25rem, 12vw, 4rem);
      height: clamp(2.25rem, 12vw, 4rem);
      border-color: var(--color-line-strong);
      pointer-events: none;
    }

    .frame-corner::after {
      position: absolute;
      width: 0.42rem;
      height: 0.42rem;
      content: "";
      background: var(--color-accent);
    }

    .frame-corner--top-left {
      top: calc(var(--space-2) * -1);
      left: calc(var(--space-2) * -1);
      border-top: 1px solid;
      border-left: 1px solid;
    }

    .frame-corner--top-left::after {
      top: -0.22rem;
      left: -0.22rem;
    }

    .frame-corner--top-right {
      top: calc(var(--space-2) * -1);
      right: calc(var(--space-2) * -1);
      border-top: 1px solid;
      border-right: 1px solid;
    }

    .frame-corner--top-right::after {
      top: -0.22rem;
      right: -0.22rem;
    }

    .frame-corner--bottom-left {
      bottom: calc(var(--space-2) * -1);
      left: calc(var(--space-2) * -1);
      border-bottom: 1px solid;
      border-left: 1px solid;
    }

    .frame-corner--bottom-left::after {
      bottom: -0.22rem;
      left: -0.22rem;
    }

    .frame-corner--bottom-right {
      right: calc(var(--space-2) * -1);
      bottom: calc(var(--space-2) * -1);
      border-right: 1px solid;
      border-bottom: 1px solid;
    }

    .frame-corner--bottom-right::after {
      right: -0.22rem;
      bottom: -0.22rem;
    }

    .home-lockup {
      width: 100%;
      max-width: 38rem;
      display: grid;
      justify-items: center;
      gap: var(--lockup-gap);
      text-align: center;
    }

    .title-group {
      display: grid;
      justify-items: center;
      gap: var(--title-gap);
      min-width: 0;
    }

    .title-kicker {
      margin: 0;
      color: var(--color-text);
      font-family: var(--font-display);
      font-size: var(--kicker-size);
      font-weight: 400;
      line-height: 1.08;
      text-transform: uppercase;
    }

    .home-title {
      max-width: 100%;
      margin: 0;
      color: var(--color-text);
      font-family: var(--font-display);
      font-size: var(--title-size);
      font-weight: 400;
      line-height: 1;
      text-transform: none;
      white-space: nowrap;
    }

    .start-portal {
      position: relative;
      width: min(100%, var(--portal-size));
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      overflow: hidden;
      border: 1px solid var(--portal-line);
      border-radius: 50%;
      background:
        linear-gradient(90deg, transparent calc(50% - 0.5px), var(--portal-line-soft) 50%, transparent calc(50% + 0.5px)),
        linear-gradient(0deg, transparent calc(50% - 0.5px), var(--portal-line-soft) 50%, transparent calc(50% + 0.5px)),
        radial-gradient(circle, transparent 0 43%, rgba(213, 22, 34, 0.18) 43.3% 43.7%, transparent 44%),
        radial-gradient(circle, rgba(213, 22, 34, 0.07), transparent 58%),
        rgba(5, 5, 7, 0.2);
      isolation: isolate;
    }

    .start-portal::before,
    .start-portal::after {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      content: "";
    }

    .start-portal::before {
      inset: clamp(1.05rem, 5vw, 1.45rem);
      border: 1px solid var(--portal-line-soft);
    }

    .start-portal::after {
      inset: clamp(2.05rem, 8.5vw, 3rem);
      border: 1px solid var(--portal-red-line);
      opacity: 0.88;
    }

    .start-button {
      position: relative;
      z-index: 1;
      width: var(--portal-button-size);
      min-width: var(--tap-target);
      aspect-ratio: 1;
      display: inline-grid;
      place-items: center;
      border: 1px solid var(--color-accent-line);
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(247, 247, 242, 0.08), transparent 58%),
        radial-gradient(circle, var(--color-accent-soft), transparent 72%),
        rgba(5, 5, 7, 0.86);
      color: var(--color-text);
      cursor: pointer;
      font-family: var(--font-display);
      font-size: var(--button-text-size);
      letter-spacing: 0;
      text-transform: uppercase;
      transition:
        border-color var(--motion-fast) var(--ease-standard),
        background-color var(--motion-fast) var(--ease-standard),
        color var(--motion-fast) var(--ease-standard);
    }

    .start-button:hover {
      border-color: var(--color-text);
      background-color: rgba(213, 22, 34, 0.1);
    }

    .start-button:focus-visible {
      outline: 2px solid var(--color-text);
      outline-offset: 0.4rem;
    }

    .status-row {
      position: relative;
      z-index: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-2) var(--space-3);
      padding:
        var(--space-3)
        max(var(--space-3), env(safe-area-inset-right))
        max(var(--space-3), env(safe-area-inset-bottom))
        max(var(--space-3), env(safe-area-inset-left));
      border-top: 1px solid rgba(247, 247, 242, 0.1);
      color: var(--color-faint);
      font-family: var(--font-display);
      font-size: var(--footer-text-size);
      font-weight: 400;
      line-height: 1.2;
      text-transform: uppercase;
    }

    .status-row span {
      min-width: 0;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 360px) {
      :root {
        --title-size: 1.88rem;
        --kicker-size: 0.94rem;
        --lockup-gap: clamp(1.55rem, 4.5svh, 2.2rem);
        --portal-size: clamp(12.5rem, 67vw, 13.25rem);
        --portal-button-size: clamp(6.45rem, 33vw, 7rem);
      }

      .ambient-particles {
        opacity: 0.24;
      }

      .ambient-rings {
        width: min(88vw, 22rem);
      }

      .home-frame {
        padding-inline: var(--space-3);
      }

      .status-row {
        justify-content: center;
        text-align: center;
        flex-wrap: wrap;
      }
    }

    @media (min-width: 480px) {
      :root {
        --title-size: 2.65rem;
        --kicker-size: 1.06rem;
        --button-text-size: 0.92rem;
        --portal-size: clamp(15rem, 54vw, 17rem);
      }
    }

    @media (min-width: 620px) {
      :root {
        --title-size: 3.25rem;
        --kicker-size: 1.1rem;
      }
    }

    @media (min-width: 760px) {
      :root {
        --title-size: 4.35rem;
        --kicker-size: 1.12rem;
        --button-text-size: 0.94rem;
        --footer-text-size: 0.72rem;
        --title-gap: 0.95rem;
        --lockup-gap: clamp(2.15rem, 6svh, 3.35rem);
        --portal-size: clamp(17rem, 28vw, 19.25rem);
        --portal-button-size: clamp(8.25rem, 14vw, 9.25rem);
      }

      .public-home {
        padding-inline: max(var(--space-5), env(safe-area-inset-left));
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }

      .ambient-energy {
        opacity: 0.34;
        transform: none;
      }

      .ambient-sweep,
      .ambient-particles {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="site-shell">
    <div class="ambient-system" aria-hidden="true">
      <span class="ambient-layer ambient-energy"></span>
      <span class="ambient-layer ambient-rings"></span>
      <span class="ambient-layer ambient-sweep"></span>
      <span class="ambient-layer ambient-particles"></span>
    </div>

    <main class="public-home" aria-labelledby="home-title">
      <section class="home-frame" aria-label="Voodoo Media public homepage">
        <span class="frame-corner frame-corner--top-left" aria-hidden="true"></span>
        <span class="frame-corner frame-corner--top-right" aria-hidden="true"></span>
        <span class="frame-corner frame-corner--bottom-left" aria-hidden="true"></span>
        <span class="frame-corner frame-corner--bottom-right" aria-hidden="true"></span>

        <div class="home-lockup">
          <div class="title-group">
            <p class="title-kicker">Welcome To</p>
            <h1 class="home-title" id="home-title">Voodoo Media</h1>
          </div>

          <div class="start-portal">
            <button
              class="start-button"
              type="button"
              aria-label="Start Voodoo Media"
              aria-describedby="start-description"
            >
              Start
            </button>
          </div>
          <span class="sr-only" id="start-description">Placeholder start control centered inside the VMPix V3 portal shell.</span>
        </div>
      </section>
    </main>

    <footer class="status-row" aria-label="Homepage status">
      <span>System Status: Standby</span>
      <span>Version 3.0</span>
    </footer>
  </div>
</body>
</html>
